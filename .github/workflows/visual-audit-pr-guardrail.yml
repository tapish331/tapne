name: Visual Audit PR Guardrail

on:
  pull_request:
  workflow_dispatch:

jobs:
  visual-audit-guardrail:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DEBUG: "1"
      SECRET_KEY: "ci-visual-audit-secret-key"
      DATABASE_URL: "sqlite:///tmp/ci-visual-audit.sqlite3"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r skills/webpage-visual-perfection-audit/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Prepare database and demo data
        run: |
          python manage.py migrate --noinput
          python manage.py bootstrap_accounts --reset-passwords
          python manage.py bootstrap_feed --create-missing-members
          python manage.py bootstrap_trips --create-missing-hosts
          python manage.py bootstrap_blogs --create-missing-authors

      - name: Run Stage-3/Stage-4 guardrail + homepage snapshots
        run: |
          set -euo pipefail
          mkdir -p artifacts/visual-audit-pr

          python manage.py runserver 127.0.0.1:8000 --noreload > artifacts/visual-audit-pr/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill ${SERVER_PID}' EXIT

          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:8000/" >/dev/null; then
              break
            fi
            sleep 1
          done

          python skills/webpage-visual-perfection-audit/scripts/crawl_and_capture.py \
            --base-url "http://127.0.0.1:8000" \
            --output-dir "artifacts/visual-audit-pr" \
            --max-pages 12 \
            --max-depth 0 \
            --include-regex "^http://127\\.0\\.0\\.1:8000/" \
            --seed-url "http://127.0.0.1:8000/" \
            --seed-url "http://127.0.0.1:8000/trips/" \
            --seed-url "http://127.0.0.1:8000/blogs/" \
            --seed-url "http://127.0.0.1:8000/search/?type=users"

          python skills/webpage-visual-perfection-audit/scripts/extract_visual_intents.py \
            --pages-json "artifacts/visual-audit-pr/pages.json" \
            --repo-root "." \
            --output-dir "artifacts/visual-audit-pr" \
            --strict

          python skills/webpage-visual-perfection-audit/scripts/validate_visual_intents.py \
            --base-url "http://127.0.0.1:8000" \
            --pages-json "artifacts/visual-audit-pr/pages.json" \
            --intent-catalog "artifacts/visual-audit-pr/intent_catalog.json" \
            --output-dir "artifacts/visual-audit-pr" \
            --strict-high-confidence

          python skills/webpage-visual-perfection-audit/scripts/capture_homepage_snapshots.py \
            --base-url "http://127.0.0.1:8000" \
            --route "/" \
            --output-dir "artifacts/visual-audit-pr/homepage-snapshots" \
            --baseline-dir "skills/webpage-visual-perfection-audit/snapshots/homepage" \
            --compare \
            --max-diff-ratio 0.03

      - name: Upload visual audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-audit-pr-artifacts
          path: artifacts/visual-audit-pr
          if-no-files-found: warn
